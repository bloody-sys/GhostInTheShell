<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        body {
            background-color: rgb(23, 23, 23);
        }

        .everything {
            width: 427px;
            height: 630px;
            padding: 30px;
            margin: 3px;
            border: 1px solid black;
            background-color: whitesmoke;
            position: relative;
            left: 500px;
        }

        .border-type {
            padding: 2px;
            margin: 2px;
            border: 1px solid white;
            background-color: white;
            height: 625px;
            width: 416px;
            margin-left: 3px;
            position: relative;
            left: 0px;
            border-radius: 10px;
        }

        .image {
            position: relative;
            left: 9px;
            top: 9px;
            border-radius: 10px;
        }

        .Karan {
            font-size: 14px;
            font-family: sans-serif;
            color: rgb(61, 60, 60);
            position: relative;
            left: 23px;
            font-weight: lighter;
        }

        .Arjun {
            font-size: 14px;
            font-family: sans-serif;
            color: rgb(61, 60, 60);
            position: relative;
            left: 43px;
            font-weight: 4px;
        }

        .sanam {
            position: relative;
            top: 5px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .bobas{
            position: relative;
            left: 10px;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

            
        }
        p{
         font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;

        }
        .button{
            width: 110px;
            height: 40px;
            background-color: rgb(197, 231, 243);
            border: 1px solid rgba(197, 231, 243);
            border-radius: 20px;
            position: relative;
            left: 170px;
            padding: 2px;
            left: 140px;
        }
        .mom{
            position: relative;
            bottom: 5px;
            color: rgb(32, 113, 235);
            
        }
    </style>
</head>

<body>
    <!--Making card given by sir-->
    <!-- lets get started -->
    <div class="everything">
        <div class="border-type">
            <img src="https://wallpaperaccess.com/full/366639.jpg" width="400px" height="300px" class="image">
            <br>
            <br>
            <span class=" sanam Karan">Nature</span>&nbsp; &nbsp; &nbsp; &nbsp;<span class="sanam Arjun">Lake</span>
            <br>
            <br>
            <h1 class="bobas">Nature Overview</h1>
            <p>Nature encompasses the physical world and everything naturally occurring on Earth.</p>
            <p> A lake is a relatively large, slow-moving or standing body of water that occupies an inland basin.</p>
            <div class="button">
                <center><p class="mom">Read more</p></center>
            </div>
        </div>
    </div>
</body>

</html>
